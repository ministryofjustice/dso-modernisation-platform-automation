          - 'oasys_test                               T2BOAUD'
          - 'oasys_test                               T2BOSYS'
          - 'oasys_test                              T2MISTRN'
          - 'oasys_test                              T2OASREP'
          - 'oasys_test                               T2OASYS'
          - 'oasys_test                              T2OASYS2'
          - 'oasys_test                              T2ONRAUD'
          - 'oasys_test                              T2ONRBDS'
          - 'oasys_test                              T2ONRSYS'
      SourceConfigVersion:
        description: 'Branch/tag/commit for modernisation-platform-configuration-management'
        type: string
        default: 'main'

permissions:
  contents: read
  packages: read
  id-token: write

env:
  ansible_config: inventory/ansible/ansible.cfg
  inventory: inventory/ansible

jobs:
  deployment:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ministryofjustice/hmpps-delius-operational-automation:0.80.0
    timeout-minutes: 1440
    continue-on-error: false
    steps:

      - name: Checkout Local Repo to get Composite Action
        uses: actions/checkout@v6.0.2

      - name: Setup Primary Database Access
        id: setup_db_system_access
        uses: ./.github/actions/setup_oracle_target_access
        with:
          TargetEntities: "${{ github.event.inputs.TargetDatabase }}"
          TargetEntitiesType: "primary"
          SourceConfigVersion: "${{ github.event.inputs.SourceConfigVersion }}"
          ModernisationPlatformEnvironmentManagement: "${{ secrets.MODERNISATION_PLATFORM_ENVIRONMENT_MANAGEMENT }}"

      - name: Fetch Required Roles & Site
        uses: actions/checkout@v6.0.2
        with:
          repository: ministryofjustice/modernisation-platform-configuration-management
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            ansible/roles/oracle-db-sql-baselines
            ansible/site.yml
          path: roles
          ref: ${{ github.event.inputs.SourceConfigVersion }}
          fetch-depth: 0

      - name: Install SQL Plan Baselines
        id: install_sql_plan_baselines
        run: |
              if [ ${{ steps.setup_db_system_access.outputs.BATCH_COUNT }} -ne 1 ];
              then
                  echo "Multiple primary databases are not expected for the same database system."
                  exit 1
              fi
              # For Non-Delius environments create host-->database mapping based on the batch targets.
              # These are called the batched target pairs as they are an array of hostname/database pairs.
              if [ ! -z "${{ steps.setup_db_system_access.outputs.batched_target_pairs }}" ]
              then
                # When targeting primary databases, we expect a single batch containing a single database
                CURRENT_BATCH=$(echo "${{ steps.setup_db_system_access.outputs.BATCHED_TARGET_PAIRS }}" | base64 -d | jq --compact-output '.[0]')
                DATABASE_COUNT=$(echo ${CURRENT_BATCH} | jq 'length')
                if [ ${DATABASE_COUNT} -ne 1]
                then
                   echo "Only one primary database should be supplied - found ${CURRENT_BATCH}."
                   exit 1
                fi
                TARGET_HOST_LIMIT="--limit "$(echo ${CURRENT_BATCH} | jq -r '.[0] | keys[0]')
                HOST_TO_DB_MAP="--extra-vars target_db_names='${CURRENT_BATCH}'"
                echo "Limiting to hosts:    ${TARGET_HOST_LIMIT}"
                echo "Host to database map: ${HOST_TO_DB_MAP}"
              fi
              ansible-playbook \
                 -i $inventory \
                 --extra-vars "application=${{ steps.setup_db_system_access.outputs.application }}" \
                 --extra-vars '{"dry_run":${{ github.event.inputs.DryRun }}}' \
                 --extra-vars "target=${{ steps.setup_db_system_access.outputs.target_group }}" \
                 ${TARGET_HOST_LIMIT} ${HOST_TO_DB_MAP} \
                 --extra-vars force_role=oracle-db-sql-baselines roles/ansible/site.yml