          - 'oasys_preproduction                      PPBOSYS'
          - 'oasys_preproduction                      PPOASYS'
          - 'oasys_production                        PDBIPINF'
          - 'oasys_production                         PDBOAUD'
          - 'oasys_production                         PDBOSYS'
