---
name: EBS Cleanup

on:
  workflow_dispatch:
    inputs:
      applications:
        description: 'e.g. nomis or leave blank for all'
        type: string
      environments:
        description: 'e.g. development or leave blank for all'
        type: string
      age_in_months:
        description: 'volumes older than _ months'
        type: string
        default: "1"

permissions:
  id-token: write
  contents: read

jobs:
  check-strategy:
    name: Check Strategy
    runs-on: ubuntu-latest
    outputs:
      matrix: "${{ steps.strategy.outputs.matrix }}"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.ref }}

      - name: Strategy
        id: strategy
        run: |
          echo "Setting strategy matrix event=${GITHUB_EVENT_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            matrix=$(src/get_dso_aws_accounts.sh gha "${{ github.event.inputs.applications }}" "${{ github.event.inputs.environments }}")
          else
            echo "Unsupported event ${GITHUB_EVENT_NAME}"
            exit 1
          fi
          echo '' > action_lines.txt
          echo 'matrix<<EOF' >> $GITHUB_OUTPUT
          echo "${matrix}" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          echo "{$matrix}"

      # need to use this artifact method because we need to update from multiple matrices, using output vars wont suffice
      - name: Upload action lines artifact 
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: "action_lines.txt"
          path: action_lines.txt
          overwrite: true

  check-ebs:
    name: Check ebs
    runs-on: ubuntu-latest
    needs: check-strategy
    strategy:
      matrix: ${{ fromJson(needs.check-strategy.outputs.matrix) }}
      max-parallel: 1
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.ref }}

      - name: Get Account Details
        id: account
        uses: ./.github/actions/get_account_details
        with:
          account_name: ${{ matrix.account_name }}
          secrets_json: ${{ secrets.MODERNISATION_PLATFORM_ENVIRONMENT_MANAGEMENT }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6.1.1
        with:
          role-to-assume: "${{ steps.account.outputs.role_arn }}"
          role-session-name: "${{ steps.account.outputs.role_session_name }}"
          aws-region: eu-west-2

      - name: Check ebs
        id: check
        run: |
          echo src/ebs_cleanup.sh -d -m ${{ github.event.inputs.age_in_months }} delete
          cleanup_output=$(src/ebs_cleanup.sh -d -m ${{ github.event.inputs.age_in_months }} delete)
          echo "${cleanup_output[@]}"
          action_lines=$(echo "${cleanup_output[@]}" | grep -E "vol-.+ months old. Reason: " || true)
          if [[ -n $action_lines ]]; then
            echo "cleanup=1" >> $GITHUB_OUTPUT
            {
            echo "action_lines<<EOF"
            echo "$action_lines"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          else
            echo "cleanup=0" >> $GITHUB_OUTPUT
          fi

      - name: Download action lines Artifact
        if: ${{ steps.check.outputs.cleanup == 1 }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: "action_lines.txt"

      - name: Append environment and action lines to lists
        if: ${{ steps.check.outputs.cleanup == 1 }}
        working-directory: ${{ github.workspace }}
        run: |
          echo "${{ steps.check.outputs.action_lines }}"
          echo "${{ matrix.account_name }}" >> action_lines.txt
          echo "${{ steps.check.outputs.action_lines }}" >> action_lines.txt
          echo "" >> action_lines.txt
      
      - name: Upload action lines Artifact
        if: ${{ steps.check.outputs.cleanup == 1 }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: "action_lines.txt"
          path: action_lines.txt
          overwrite: true


  cleanup-strategy:
    name: Cleanup Strategy
    needs: check-ebs
    runs-on: ubuntu-latest
    steps:
      - name: Download action lines Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: "action_lines.txt"
      
      - name: Strategy
        id: strategy
        run: |
          echo "ACTIONS: $(cat action_lines.txt)"
          echo '>'
          echo "To delete these volumes you can use src/ebs_cleanup.sh or:"
          sed -E "s/.*(vol-[a-zA-Z0-9]+).* months old. Reason:.*/aws ec2 delete-volume --volume-id \1 --region eu-west-2/" action_lines.txt
