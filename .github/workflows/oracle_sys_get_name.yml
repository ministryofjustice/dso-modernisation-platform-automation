          - 'oasys_test                               (OASYS2_TAF)=>T2OASYS2'
          - 'oasys_test                (OASYS_TAF)=>T1OASYS,T1AZBIPI,T2OASYS'
          - 'oasys_test                      (ONRAUD_TAF)=>T1ONRAUD,T2ONRAUD'
          - 'oasys_test                     (ONRBODS_TAF)=>T1ONRBDS,T2ONRBDS'
          - 'oasys_test                      (ONRSYS_TAF)=>T1ONRSYS,T2ONRSYS'
      SourceConfigVersion:
        description: 'Branch/tag/commit for modernisation-platform-configuration-management'
        type: string
        default: 'main'

permissions:
  contents: read
  packages: read
  id-token: write

env:
  ansible_config: operations/playbooks/ansible.cfg
  inventory: inventory/ansible

jobs:
  deployment:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ministryofjustice/hmpps-delius-operational-automation:0.80.0
    timeout-minutes: 1440
    continue-on-error: false
    steps:

      - name: Checkout Local Repo to get Composite Action
        uses: actions/checkout@v6.0.2

      - name: Setup Database System Access
        id: setup_db_system_access
        uses: ./.github/actions/setup_oracle_target_access
        with:
          TargetEntities: "${{ github.event.inputs.TargetSystem }}"
          TargetEntitiesType: "system"
          SourceConfigVersion: "${{ github.event.inputs.SourceConfigVersion }}"
          ModernisationPlatformEnvironmentManagement: "${{ secrets.MODERNISATION_PLATFORM_ENVIRONMENT_MANAGEMENT }}"

      - name: Fetch Required Roles & Site
        uses: actions/checkout@v6.0.2
        with:
          repository: ministryofjustice/modernisation-platform-configuration-management
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            ansible/roles/oracle-db-get-name
            ansible/site.yml
          path: roles
          ref: ${{ github.event.inputs.SourceConfigVersion }}
          fetch-depth: 0

      - name: Get Database Name
        id: get_db_name
        run: |
             # For Non-Delius environments the hosts and databases are supplied as a list of
             # pairs (since there is potentially more than one database per host, the 
             # database name must be supplied).  Additionally these lists are batched to 
             # prevent attempting to run Ansible on the same host more than once concurrently.
             
             for BATCH in $(seq 0 $(( ${{ steps.setup_db_system_access.outputs.BATCH_COUNT }} - 1 )) ); do
               echo "Processing batch $BATCH"
               # For Non-Delius environments create host-->database mapping based on the batch targets
               echo "${{ steps.setup_db_system_access.outputs.BATCHED_TARGET_PAIRS }}" | base64 -d | jq '.[BATCH]'
             done
             exit 0
             # In Non-Delius environments the database name must be supplied since there is
             # potentially more than one primary database per host.   (Optional for Delius)
             if [ ! -z "${{ steps.setup_primary_db_access.outputs.target_db_name }}" ]
             then
                TARGET_DB_NAME_SWITCH="--extra-vars target_db_name=${{ steps.setup_primary_db_access.outputs.target_db_name }}"
             fi
             # In Non-Delius environments the target primary database host must be supplied since the
             # Ansible inventory does not segregate primary and and standby hosts.  (Optional for Delius)
             # (In Delius the split is done using the "database" tag in EC2 which is set to either primarydb or
             # standbydb1 or standbydb2.  This tag is not used outside of Delius so those groups do not exist).
             if [ ! -z "${{ steps.setup_primary_db_access.outputs.target_db_host }}" ]
             then
                TARGET_DB_HOST_LIMIT="--limit ${{ steps.setup_primary_db_access.outputs.target_db_host }}"
             fi
             ansible-playbook \
                 -i $inventory \
                 --extra-vars "target=${{ steps.setup_primary_db_access.outputs.target_group }}" \
                 ${TARGET_DB_NAME_SWITCH} ${TARGET_DB_HOST_LIMIT} \
                 --extra-vars force_role=oracle-db-get-name roles/ansible/site.yml
