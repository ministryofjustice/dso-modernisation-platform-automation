          - 'nomis_combined_reporting_test            (BIPSYS_TAF)=>T1BIPSYS'
          - 'nomis_combined_reporting_test              (BISYS_TAF)=>T1BISYS'
          - 'nomis_preproduction                      (CNMAUD_TAF)=>PPCNMAUD'
