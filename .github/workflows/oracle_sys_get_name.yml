name: Oracle System - Get All Database Names
description: "Read-only workflow to access all databases and read their names"

# This workflow is intended for development and debug purposes only.   It allows us to
# connect to all databases in a system and read their names.  This allows us to check inventory
# and name resolution of primary databases across environments without making any changes
# to them.

# TargetDatabase options may be generated using the oracle_db_generate_target_list.yml workflow
# using the "system" option

