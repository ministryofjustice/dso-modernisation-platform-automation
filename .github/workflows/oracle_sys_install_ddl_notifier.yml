permissions:
  contents: read
  packages: read
  id-token: write

env:
  ansible_config: operations/playbooks/ansible.cfg
  inventory: inventory/ansible

jobs:
  deployment:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ministryofjustice/hmpps-delius-operational-automation:0.80.0
    timeout-minutes: 1440
    continue-on-error: false
    steps:

      - name: Checkout Local Repo to get Composite Action
        uses: actions/checkout@v6.0.2

      - name: Setup Database System Access
        id: setup_db_system_access
        uses: ./.github/actions/setup_oracle_target_access
        with:
          TargetEntities: "${{ github.event.inputs.TargetSystem }}"
          TargetEntitiesType: "system"
          SourceConfigVersion: "${{ github.event.inputs.SourceConfigVersion }}"
          ModernisationPlatformEnvironmentManagement: "${{ secrets.MODERNISATION_PLATFORM_ENVIRONMENT_MANAGEMENT }}"

      - name: Fetch Required Roles & Site
        uses: actions/checkout@v6.0.2
        with:
          repository: ministryofjustice/modernisation-platform-configuration-management
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            ansible/roles/oracle-db-ddl-notifier
            ansible/roles/oracle-oms-setup
            ansible/roles/
            ansible/site.yml
          path: roles
          ref: ${{ github.event.inputs.SourceConfigVersion }}
          fetch-depth: 0

      - name: Install DDL Notifier
        id: install_ddl_notifier
        run: |
             # For Non-Delius environments the hosts and databases are supplied as a list of
             # pairs (since there is potentially more than one database per host, the 
             # database name must be supplied).  Additionally these lists are batched to 
             # prevent attempting to run Ansible on the same host more than once concurrently.
             
             for BATCH in $(seq 0 $(( ${{ steps.setup_db_system_access.outputs.batch_count }} - 1 )) ); do
               echo "Processing batch $(( BATCH + 1 )) of ${{ steps.setup_db_system_access.outputs.batch_count }}"
               # For Non-Delius environments create host-->database mapping based on the batch targets.
               # These are called the batched target pairs as they are an array of hostname/database pairs.
               if [ ! -z "${{ steps.setup_db_system_access.outputs.batched_target_pairs }}" ]
               then
                  CURRENT_BATCH=$(echo "${{ steps.setup_db_system_access.outputs.batched_target_pairs }}" | base64 -d | jq --compact-output --argjson idx "$BATCH" '.[$idx]')
                  TARGET_HOST_LIMIT="--limit "$(echo ${CURRENT_BATCH} | jq -r '.[] | keys[]' | paste -sd,)
                  HOST_TO_DB_MAP="--extra-vars target_db_names='${CURRENT_BATCH}'"
                  echo "Limiting to hosts:    ${TARGET_HOST_LIMIT}"
                  echo "Host to database map: ${HOST_TO_DB_MAP}"
               fi
               ansible-playbook \
                    -i $inventory \
                    --extra-vars "application=${{ steps.setup_db_system_access.outputs.application }}" \
                    --extra-vars "target=${{ steps.setup_db_system_access.outputs.target_group }}" \
                    --extra-vars "target_environment=${{ steps.setup_db_system_access.outputs.target_environment }}" \
                    --extra-vars "application_tier=${{ steps.setup_db_system_access.outputs.application_tier }}" \
                    --extra-vars "account_name=${{ steps.setup_db_system_access.outputs.account_name }}" \
                    ${TARGET_HOST_LIMIT} ${HOST_TO_DB_MAP} \
                    --extra-vars force_role=oracle-db-ddl-notifier roles/ansible/site.yml
             done
