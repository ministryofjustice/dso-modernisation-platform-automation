name: Oracle System - Install DDL Notifier
description: "Install trigger and package to send Slack Notifications of DDL Changes"

# This workflow installs a DDL trigger and PL/SQL package in the primary database of
# the nominated database system which will send Slack notifications in the event of
# DDL changes in any schemas listed in the ddl_notifier Ansible variable.
# This workflow is run against a database system rather than only the primary database
# since this allows it to create Oracle wallets for Slack SSL certificates on all nodes
# ready in case a database switches or fails over to the standby. (The trigger and
# package are only created in the primary).

# TargetSystem options may be generated using the oracle_db_generate_target_list.yml workflow
# using the "system" option

on:
  workflow_dispatch:
    inputs:
      TargetSystem:
        description: 'Database Systems for Installation of DDL Notifier'
