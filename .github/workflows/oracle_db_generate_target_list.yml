name: Oracle DB Generate Oracle Targets List
description: "Generate list of environment names and their associated databases or database systems"

# This is a helper workflow which generates a list of environments and databases
# or database systems
# which may be cut & paste into the options list for other workflows whenever
# the set of available databases changes.   
# This is a workaround since GHA does not currently support dynamic option lists.

on:
  workflow_dispatch:
    inputs:
      TargetType:
        description: 'Generate List of Primary Databases only or Database Systems (including standby databases)'
        type: choice
        options:
          - primary
          - system
      SourceConfigVersion:
        description: 'Branch/tag/commit for modernisation-platform-configuration-management'
        type: string
        default: 'main'

permissions:
  contents: read
  packages: read
  id-token: write

env:
  inventory: inventory/ansible

jobs:
  deployment:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ministryofjustice/hmpps-delius-operational-automation:0.80.0
    timeout-minutes: 1440
    continue-on-error: false
    steps:

      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout Inventory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ministryofjustice/modernisation-platform-configuration-management
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            ansible/group_vars
          path: inventory
          ref: ${{ inputs.SourceConfigVersion }}
          fetch-depth: 0

      - name: Generate Primary Database List
        shell: bash
        run: |
             src/get_oracle_workflow_options_list.sh ${{ inputs.TargetType }} src/DBA_APPLICATIONS.txt $inventory/group_vars