name: "Get Account Details"
description: "Retrieves AWS account ID from GitHub secrets with fallback to AWS Secrets Manager, and generates role ARN"

inputs:
  account_name:
    description: "Name of the AWS account to lookup (e.g., nomis-development, oasys-production)"
    required: true
  secrets_json:
    description: "JSON content of MODERNISATION_PLATFORM_ENVIRONMENT_MANAGEMENT secret"
    required: true
  role_name:
    description: "IAM role name to assume (default: modernisation-platform-oidc-cicd)"
    required: false
    default: "modernisation-platform-oidc-cicd"

outputs:
  account_id:
    description: "AWS Account ID"
    value: ${{ steps.resolve_account.outputs.account_id }}
  role_arn:
    description: "Full ARN of the IAM role to assume"
    value: ${{ steps.resolve_account.outputs.role_arn }}
  role_session_name:
    description: "Generated role session name for AWS credentials"
    value: ${{ steps.resolve_account.outputs.role_session_name }}

runs:
  using: composite
  steps:
    - name: Resolve Account ID
      id: resolve_account
      shell: bash
      run: |
        echo "Resolving account ID for: ${{ inputs.account_name }}"
        
        # Try to get account ID from GitHub secrets first
        account_id="${{ fromJSON(inputs.secrets_json).account_ids[inputs.account_name] }}"
        
        if [ -z "$account_id" ] || [ "$account_id" = "null" ]; then
          echo "Account ID not found in GitHub secrets, fetching from AWS Secrets Manager..."
          
          # Get the Modernisation Platform account ID to access Secrets Manager
          mp_account_id="${{ fromJSON(inputs.secrets_json).account_ids['modernisation_platform_account_id'] }}"
          
          if [ -z "$mp_account_id" ] || [ "$mp_account_id" = "null" ]; then
            echo "ERROR: Cannot retrieve modernisation_platform_account_id from secrets"
            exit 1
          fi
          
          # Fetch from AWS Secrets Manager
          secret_json=$(aws secretsmanager get-secret-value \
            --secret-id "arn:aws:secretsmanager:eu-west-2:${mp_account_id}:secret:environment_management" \
            --output text \
            --query SecretString 2>&1)
          
          if [ $? -ne 0 ]; then
            echo "ERROR: Failed to retrieve secret from AWS Secrets Manager"
            echo "$secret_json"
            exit 1
          fi
          
          account_id=$(echo "$secret_json" | jq -r ".account_ids[\"${{ inputs.account_name }}\"]")
          
          if [ -z "$account_id" ] || [ "$account_id" = "null" ]; then
            echo "ERROR: Account ID not found for '${{ inputs.account_name }}' in either GitHub secrets or AWS Secrets Manager"
            exit 1
          fi
          
          echo "✓ Account ID retrieved from AWS Secrets Manager"
        else
          echo "✓ Account ID retrieved from GitHub secrets"
        fi
        
        # Validate account ID format (12 digits)
        if ! [[ "$account_id" =~ ^[0-9]{12}$ ]]; then
          echo "ERROR: Invalid account ID format: $account_id (expected 12 digits)"
          exit 1
        fi
        
        # Generate role ARN
        role_arn="arn:aws:iam::${account_id}:role/${{ inputs.role_name }}"
        
        # Generate role session name (max 64 characters)
        # Format: github-{repo_id}-{run_id}-{account_name_truncated}
        account_name_truncated=$(echo "${{ inputs.account_name }}" | cut -c1-20)
        role_session_name="github-${{ github.repository_id }}-${{ github.run_id }}-${account_name_truncated}"
        
        # Output results
        echo "account_id=${account_id}" >> $GITHUB_OUTPUT
        echo "role_arn=${role_arn}" >> $GITHUB_OUTPUT
        echo "role_session_name=${role_session_name}" >> $GITHUB_OUTPUT
        
        echo "Account ID: ${account_id}"
        echo "Role ARN: ${role_arn}"
        echo "Role Session Name: ${role_session_name}"
